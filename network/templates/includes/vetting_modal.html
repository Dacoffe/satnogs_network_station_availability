{% load tags %}
<div class="modal fade" id="VettingModal" tabindex="-1" role="dialog" aria-labelledby="VettingModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="VettingModalTitle">Waterfall Vetting Details</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row mb-3">
                    <div class="col-md-12">
                        <h6>Vetting Distribution</h6>
                        <div class="progress" style="height: 30px;">
                            <div id="modal-vetting-bar-good" class="progress-bar badge-good" role="progressbar" style="width: 0%">
                                <span id="modal-vetting-bar-good-text"></span>
                            </div>
                            <div id="modal-vetting-bar-bad" class="progress-bar badge-bad" role="progressbar" style="width: 0%">
                                <span id="modal-vetting-bar-bad-text"></span>
                            </div>
                            <div id="modal-vetting-bar-unknown" class="progress-bar badge-unknown" role="progressbar" style="width: 0%">
                                <span id="modal-vetting-bar-unknown-text"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-12">
                        <h6>Summary</h6>
                        <dl class="row">
                            <dt class="col-sm-4">Total Vettings:</dt>
                            <dd class="col-sm-8" id="vetting-total">-</dd>

                            <dt class="col-sm-4">With Signal:</dt>
                            <dd class="col-sm-8">
                                <span id="vetting-good-count">-</span>
                                <span class="badge badge-good" id="vetting-good-percent">-%</span>
                            </dd>

                            <dt class="col-sm-4">Without Signal:</dt>
                            <dd class="col-sm-8">
                                <span id="vetting-bad-count">-</span>
                                <span class="badge badge-bad" id="vetting-bad-percent">-%</span>
                            </dd>

                            <dt class="col-sm-4">Unknown:</dt>
                            <dd class="col-sm-8">
                                <span id="vetting-unknown-count">-</span>
                                <span class="badge badge-unknown" id="vetting-unknown-percent">-%</span>
                            </dd>
                        </dl>
                    </div>
                </div>

                <hr>

                <div class="row">
                    <div class="col-md-12">
                        <h6>Individual Vettings</h6>
                        <div id="vetting-list" style="max-height: 300px; overflow-y: auto;">
                            <p class="text-center text-muted">Loading vettings...</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
