{% load tags %}
<div class="modal fade" id="TransmitterParamsModal" tabindex="-1" role="dialog" aria-labelledby="TransmitterParamsModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="TransmitterParamsModalTitle">Transmitter Parameters</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6>Basic Information</h6>
                        <dl class="row">
                            <dt class="col-sm-5">UUID:</dt>
                            <dd class="col-sm-7" id="param-uuid">-</dd>

                            <dt class="col-sm-5">Description:</dt>
                            <dd class="col-sm-7" id="param-description">-</dd>

                            <dt class="col-sm-5">Type:</dt>
                            <dd class="col-sm-7" id="param-type">-</dd>

                            <dt class="col-sm-5">Status:</dt>
                            <dd class="col-sm-7">
                                <span id="param-status" class="badge">-</span>
                            </dd>
                        </dl>
                    </div>

                    <div class="col-md-6">
                        <h6>Frequency Information</h6>
                        <dl class="row">
                            <dt class="col-sm-5">Downlink Low:</dt>
                            <dd class="col-sm-7" id="param-downlink-low">-</dd>

                            <dt class="col-sm-5">Downlink High:</dt>
                            <dd class="col-sm-7" id="param-downlink-high">-</dd>

                            <dt class="col-sm-5">Uplink Low:</dt>
                            <dd class="col-sm-7" id="param-uplink-low">-</dd>

                            <dt class="col-sm-5">Uplink High:</dt>
                            <dd class="col-sm-7" id="param-uplink-high">-</dd>
                        </dl>
                    </div>
                </div>

                <hr>

                <div class="row">
                    <div class="col-md-6">
                        <h6>Modulation & Encoding</h6>
                        <dl class="row">
                            <dt class="col-sm-5">Mode:</dt>
                            <dd class="col-sm-7" id="param-mode">-</dd>

                            <dt class="col-sm-5">Baud Rate:</dt>
                            <dd class="col-sm-7" id="param-baud">-</dd>

                            <dt class="col-sm-5">Invert:</dt>
                            <dd class="col-sm-7" id="param-invert">-</dd>
                        </dl>
                    </div>

                    <div class="col-md-6">
                        <h6>Additional Details</h6>
                        <dl class="row">
                            <dt class="col-sm-5">Service:</dt>
                            <dd class="col-sm-7" id="param-service">-</dd>

                            <dt class="col-sm-5">Satellite:</dt>
                            <dd class="col-sm-7" id="param-satellite">-</dd>

                            <dt class="col-sm-5">Updated:</dt>
                            <dd class="col-sm-7" id="param-updated">-</dd>
                        </dl>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
